name: Publish to NPM registry

on:
  workflow_dispatch:
    inputs:
      releaseType:
        description: 'Release type - major, minor or patch'
        required: true
        default: 'patch'
      distTag:
        description: 'NPM tag (e.g. use "next" to release a test version)'
        required: true
        default: 'latest'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: 'main'
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Git Setup
        run: |
          git config --global user.email "samtreweek@gmail.com"
          git config --global user.name "Sam Treweek"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: |
          for i in 1 2 3; do
            npx playwright install --with-deps && break || (echo "playwright install failed - retry $i" && sleep 8)
          done

      - name: Build
        run: npm run build

      - name: Run eslint & prettier
        run: npm run lint && npm run format:check

      - name: Run tests
        run: npm test

      - name: Release
        run: npm run release:ci -- ${{ github.event.inputs.releaseType }} --npm.tag=${{ github.event.inputs.distTag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
